---
layout: default
---
<h1>{{ page.title }}</h1>
<div class="post-meta-row">
  <h3>{{ page.subtitle }}</h3>
  <span id="date-read-time">
    {{ page.date | date: "%-d %B %Y" }}
    &nbsp;&middot;&nbsp;
    {% assign words = content | number_of_words %}
    {% assign minutes = words | divided_by: 200 | plus: 1 %}
    {{ minutes }} min read
  </span>
</div>
<hr class="post-rule" />
<div class="post-content">
{{ content }}
</div>
