---
layout: default
---
<h1>{{ page.title }}</h1>
<h3>{{ page.subtitle }}</h3>
<p>
  <span id="date-read-time">
  {{ page.date | date: "%d/%m/%Y" }}
  &nbsp;&middot;&nbsp;
  {% assign words = content | number_of_words %}
  {% assign minutes = words | divided_by: 200 | plus: 1 %}
  {{ minutes }} min read
  </span>
</p>

        border-style: none none dashed; 
        "/> -->
{{ content }}
